lid var(--ds-primary);transform:translateY(-20px);opacity:0;transition:all .3s;pointer-events:all;color:var(--ds-text-primary)}.notification.show{transform:translateY(0);opacity:1}.notification.success{border-right-color:#10b981}.notification.error{border-right-color:#ef4444}.notification i{font-size:1.2rem}.notification.success i{color:#10b981}.notification.error i{color:#ef4444}.duration-card{background:var(--ds-bg-surface);border-radius:var(--ds-radius-lg);padding:var(--ds-spacing-lg);box-shadow:var(--ds-shadow-md);border:1px solid var(--ds-border-light);max-width:400px;margin:2rem auto 0}.duration-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}.duration-input-group{display:flex;align-items:center;background:var(--ds-bg-primary);border:1px solid var(--ds-border);border-radius:var(--ds-radius-md);padding:.2rem .5rem;flex:1 1 200px}.duration-input-group input{width:80px;border:none;background:0 0;color:var(--ds-text-primary);font-family:var(--ds-font-primary);font-size:1.2rem;text-align:center;outline:0;padding:.5rem 0}.duration-input-group span{color:var(--ds-text-secondary);font-weight:600;margin-right:4px}.duration-toggle{display:flex;align-items:center;gap:12px;margin-right:auto}.duration-toggle .status-active-label{font-size:1rem}@media (max-width:600px){.page-header{flex-direction:column;align-items:stretch}.search-box input{width:100%}.status-grid{grid-template-columns:1fr}.tabs-container{justify-content:center}.duration-row{flex-direction:column;align-items:stretch}.duration-toggle{margin-right:0;justify-content:space-between}}</style></head><body><div id="notificationContainer" class="notification-container"></div><div class="container"><div class="tabs-container"><button class="tab-btn active" id="tabClient"><i class="fas fa-user"></i> UPDATE CLIENT</button> <button class="tab-btn" id="tabShipping"><i class="fas fa-truck"></i> UPDATE SHIPPING</button> <button class="tab-btn" id="tabSecretary"><i class="fas fa-user-tie"></i> UPDATE SECRETARY</
