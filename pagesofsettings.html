-title);font-family:Cairo,sans-serif;font-weight:700;font-size:1.3rem;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden}.settings-title::before{content:'';position:absolute;bottom:-2px;right:0;width:60px;height:2px;background:linear-gradient(90deg,var(--bg-gradient-start),var(--bg-gradient-end));animation:title-shine 3s infinite}@keyframes title-shine{0%,100%{opacity:.5;width:60px}50%{opacity:1;width:100px}}.settings-title span:first-child{font-size:1.5rem;filter:drop-shadow(0 2px 4px rgba(0, 0, 0, .1));animation:title-emoji-float 3s infinite ease-in-out}@keyframes title-emoji-float{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-3px) rotate(5deg)}}.settings-menu{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px}.settings-item{padding:16px 20px;background:0 0;border:none;border-radius:12px;cursor:pointer;transition:var(--transition-smooth);position:relative;color:var(--text-secondary);font-family:Tajawal,sans-serif;list-style:none;margin:0;backdrop-filter:blur(5px)}.settings-item:hover{background:var(--bg-hover-light);transform:translateX(-5px);box-shadow:var(--shadow-md)}.settings-item div{display:flex;align-items:center;gap:14px;position:relative;z-index:2}.settings-item span:first-child{font-size:1.3rem;width:28px;text-align:center;transition:var(--transition-bounce)}.settings-item span:last-child{font-weight:500;font-size:1rem;letter-spacing:.3px;position:relative}.settings-item:not(.active){color:var(--text-secondary)!important}.settings-item:not(.active):hover{color:var(--text-hover)!important}.settings-item:not(.active):hover::before{content:'';position:absolute;bottom:0;left:0;width:0;height:3px;background:linear-gradient(90deg,var(--bg-gradient-start),var(--bg-gradient-end));animation:draw-line .5s cubic-bezier(.4,0,.2,1) forwards;border-radius:3px}@keyframes draw-line{0%{width:0;left:0;opacity:0}50%{opacity:1}100%{width:100%;opacity:.8}}.settings-item:not(.active):hover span:first-child{animation:icon-bounce-advanced .5s cubic-bezier(.68,-.55,.265,1.55)}@keyframes icon-bounce-advanced{0%,100%{transform:translateY(0) scale(1)}30%{transform:translateY(-8px) scale(1.2)}60%{transform:translateY(-3px) scale(1.1)}}.settings-item.active{position:relative!important;color:var(--text-primary)!important;background:linear-gradient(90deg,rgba(var(--bg-gradient-start),.05),rgba(var(--bg-gradient-end),.02));transform:scale(1.02)}.settings-item.active::after{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);height:70%;width:6px;background:linear-gradient(180deg,var(--bg-gradient-start),var(--bg-gradient-end));border-radius:0 6px 6px 0;animation:active-bar-pulse 3s infinite ease-in-out;box-shadow:0 0 15px var(--bg-gradient-start),0 0 30px rgba(var(--bg-gradient-start),.3)}@keyframes active-bar-pulse{0%,100%{height:70%;opacity:.9}50%{height:85%;opacity:1;box-shadow:0 0 20px var(--bg-gradient-start),0 0 40px rgba(var(--bg-gradient-start),.5)}}.settings-item.active::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,rgba(var(--bg-gradient-start),.12),rgba(var(--bg-gradient-end),.08));border-radius:12px;z-index:1;animation:active-glow-pulse 4s infinite alternate}@keyframes active-glow-pulse{0%{opacity:.6;background:linear-gradient(90deg,rgba(var(--bg-gradient-start),.1),rgba(var(--bg-gradient-end),.05))}100%{opacity:1;background:linear-gradient(90deg,rgba(var(--bg-gradient-start),.15),rgba(var(--bg-gradient-end),.1))}}.settings-item.active span:last-child{font-weight:700!important;position:relative;padding-right:10px;text-shadow:0 2px 4px rgba(0,0,0,.1)}.settings-item.active span:first-child{animation:active-icon-float-advanced 3s infinite ease-in-out;filter:drop-shadow(0 4px 6px var(--active-glow));transform-origin:center}@keyframes active-icon-float-advanced{0%,100%{transform:translateY(0) rotate(0) scale(1)}25%{transform:translateY(-4px) rotate(-3deg) scale(1.1)}75%{transform:translateY(-2px) rotate(2deg) scale(1.05)}}.settings-item.active::before{content:'';position:absolute;top:-2px;left:-2px;right:-2px;bottom:-2px;background:linear-gradient(45deg,var(--bg-gradient-start),transparent 40%,transparent 60%,var(--bg-gradient-end));border-radius:14px;z-index:-1;opacity:0;animation:border-glow 3s infinite}@keyframes border-glow{0%,100%{opacity:0}50%{opacity:.3}}.settings-item:active:not(.active){transform:scale(.98);transition:transform .1s}.settings-menu::-webkit-scrollbar{width:6px}.settings-menu::-webkit-scrollbar-track{background:0 0}.settings-menu::-webkit-scrollbar-thumb{background:var(--text-secondary);border-radius:10px;opacity:.3}.settings-menu::-webkit-scrollbar-thumb:hover{background:var(--text-hover)}@media (max-width:768px){.settings-item{padding:14px 16px;border-radius:10px}.settings-title{font-size:1.2rem;margin-bottom:20px;padding-bottom:10px}.settings-item:hover{transform:translateX(-3px)}.settings-item.active{transform:scale(1.01)}}@media (min-width:1440px){.settings-item{padding:18px 24px}.settings-item span:first-child{font-size:1.4rem}.settings-item span:last-child{font-size:1.1rem}}@media (prefers-contrast:high){.settings-item.active::after{background:var(--bg-active);box-shadow:none}}@media (prefers-reduced-motion:reduce){.settings-item,.settings-item span,.settings-item::after,.settings-item::before{animation:none!important;transition:none!important;transform:none!important}}</style></head><body><h3 class="settings-title"><span>⚙️</span> <span>إعدادات النظام المتقدمة</span></h3><ul class="settings-menu"><li data-page="profileadmin.html" class="settings-item"><div><span>👥</span> <span>إدارة حسابي</span></div></li><li data-page="updates.html" class="settings-item active"><div><span>🫣</span> <span>حالات الـUpdates</span></div></li><li data-page="Permission.html" class="settings-item"><div><span>🔐</span> <span>إدارة الصلاحيات</span></div></li><li data-page="users.html" class="settings-item"><div><span>👤</span> <span>إدارة الموظفين</span></div></li><li data-page="shipping.html" class="settings-item"><div><span>🚚</span> <span>شركات الشحن</span></div></li><li data-page="suppliers.html" class="settings-item"><div><span>💰</span> <span>الموردين</span></div></li><li data-page="store.html" class="settings-item"><div><span>📦</span> <span>المخازن و المنتجات</span></div></li><li data-page="paymentMethods.html" class="settings-item"><div><span>💵</span> <span>إدارة طرق الدفع</span></div></li><li data-page="lead-sources.html" class="settings-item"><div><span>📋</span> <span>إدارة مصادر العملاء</span></div></li><li data-page="backup.html" class="settings-item"><div><span>🔄</span> <span>إدارة النسخ الاحتياطي</span></div></li></ul><script src="pagesofsettings_0.js"></script></body></html>
