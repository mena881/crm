ary);transform:translateY(-20px);opacity:0;transition:all .3s;pointer-events:all;color:var(--ds-text-primary)}.notification.show{transform:translateY(0);opacity:1}.notification.success{border-right-color:#10b981}.notification.error{border-right-color:#ef4444}.notification i{font-size:1.2rem}.notification.success i{color:#10b981}.notification.error i{color:#ef4444}@media (max-width:600px){.page-header{flex-direction:column;align-items:stretch}.search-box input{width:100%}.status-grid{grid-template-columns:1fr}.row-2cols{grid-template-columns:1fr}}</style></head><body><div id="notificationContainer" class="notification-container"></div><div class="container"><div class="page-header"><h1><i class="fas fa-credit-card" style="margin-left:10px"></i> إدارة طرق الدفع</h1><div class="actions"><div class="search-box"><i class="fas fa-search"></i> <input type="text" id="searchInput" placeholder="بحث..."></div><button class="btn btn-success" id="exportExcelBtn" title="تصدير Excel"><i class="fas fa-file-excel"></i> Excel</button> <button class="btn btn-primary" id="addBtn"><i class="fas fa-plus"></i> طريقة دفع جديدة</button></div></div><div id="loadingIndicator" style="text-align:center;padding:2rem"><i class="fas fa-spinner fa-spin fa-2x"></i></div><div id="statusGrid" class="status-grid"></div><div id="emptyStateTemplate" class="empty-state" style="display:none"><i class="fas fa-inbox"></i><h3>لا توجد طرق دفع</h3><p>أضف طريقة دفع جديدة باستخدام الزر أعلاه</p></div></div><div id="paymentMethodModal" class="modal-overlay"><div class="modal-content"><h3 id="paymentMethodModalTitle">إضافة طريقة دفع</h3><div class="form-group"><label for="paymentMethodName">اسم طريقة الدفع *</label> <input type="text" id="paymentMethodName" placeholder="مثال: فيزا, كاش, تحويل بنكي, مدى ..." autocomplete="off"></div><div class="form-group" style="display:flex;align-items:center;gap:10px"><label style="margin:0">مفعلة</label> <input type="checkbox" id="paymentMethodActive" checked="checked" style="wi
