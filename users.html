stify-content:space-between;margin-top:8px;border-top:1px solid var(--ds-border-light);padding-top:12px;flex-wrap:wrap;gap:10px}.status-active-label{font-size:.9rem;color:var(--ds-text-secondary)}.empty-state{text-align:center;padding:3rem;color:var(--ds-text-secondary);background:var(--ds-bg-surface);border-radius:var(--ds-radius-lg);border:2px dashed var(--ds-border)}.empty-state i{font-size:3rem;margin-bottom:1rem;opacity:.6}.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:2000;opacity:0;visibility:hidden;transition:opacity .3s ease,visibility .3s}.modal-overlay.show{opacity:1;visibility:visible}.modal-content{background:var(--ds-bg-surface);border-radius:var(--ds-radius-lg);width:90%;max-width:600px;max-height:85vh;overflow-y:auto;padding:var(--ds-spacing-xl);box-shadow:var(--ds-shadow-xl);transform:scale(.9) translateY(20px);transition:transform .4s cubic-bezier(.34, 1.56, .64, 1)}.modal-overlay.show .modal-content{transform:scale(1) translateY(0)}.modal-content h3{margin-bottom:var(--ds-spacing-lg);font-family:var(--ds-font-heading)}.form-group{margin-bottom:var(--ds-spacing-md)}.form-group label{display:block;margin-bottom:6px;font-weight:600;color:var(--ds-text-secondary)}.modal-content input,.modal-content select{width:100%;padding:.8rem 1rem;border:1px solid var(--ds-border);border-radius:var(--ds-radius-md);background:var(--ds-bg-primary);color:var(--ds-text-primary);font-family:var(--ds-font-primary);transition:border .2s}.modal-content input:focus,.modal-content select:focus{outline:0;border-color:var(--ds-primary);box-shadow:0 0 0 3px rgba(var(--ds-primary-rgb),.2)}.row-2cols{display:grid;grid-template-columns:1fr 1fr;gap:var(--ds-spacing-md)}.modal-actions{display:flex;justify-content:flex-end;gap:var(--ds-spacing-sm);margin-top:var(--ds-spacing-lg)}.spinner{display:inline-block;width:20px;height:20px;border:3px solid rgb
