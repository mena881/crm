<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" type="image/png" sizes="32x32" href="logo.png"><title>MR.Flow - إدارة فواتير المرتجع</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="allcss.css"><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=El+Messiri:wght@400;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script><script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script><link rel="stylesheet" href="header-styles.css"><style>:root{--ds-primary:#4361ee;--ds-primary-rgb:67,97,238;--ds-secondary:#3a0ca3;--ds-secondary-rgb:58,12,163}main{padding:2rem;max-width:1400px;margin:0 auto}.page-header{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:var(--ds-spacing-md);margin-bottom:var(--ds-spacing-lg);background:var(--ds-bg-surface);padding:var(--ds-spacing-lg);border-radius:var(--ds-radius-lg);box-shadow:var(--ds-shadow-sm)}.page-header h1{font-family:var(--ds-font-heading);font-size:2rem;background:var(--ds-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:flex;align-items:center;gap:10px;margin:0}.actions{display:flex;gap:var(--ds-spacing-sm);flex-wrap:wrap}.search-box{display:flex;align-items:center;background:var(--ds-bg-surface);border:1px solid var(--ds-border);border-radius:var(--ds-radius-lg);padding:.4rem 1rem;box-shadow:var(--ds-shadow-sm);min-width:300px}.search-box i{color:var(--ds-text-secondary);margin-left:8px}.search-box input{border:none;background:0 0;color:var(--ds-text-primary);font-family:var(--ds-font-primary);outline:0;width:100%}.btn-action{padding:.6rem 1.4rem;border:none;border-radius:var(--ds-radius-md);font-family:var(--ds-font-primary);font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .2s ease;background:var(--ds-bg-surface);color:var(--ds-text-primary);border:1px solid var(--ds-border);white-space:nowrap}.btn-action:hover{transform:translateY(-2px);box-shadow:var(--ds-shadow-md);border-color:var(--ds-primary);color:var(--ds-primary)}.btn-action.primary{background:var(--ds-gradient);color:#fff;border:none}.btn-action.success{background:#10b981;color:#fff;border:none}.btn-action.success:hover{background:#059669}.btn-action.warning{background:#f59e0b;color:#fff;border:none}.btn-action.warning:hover{background:#d97706}.btn-action.danger{background:#ef4444;color:#fff;border:none}.btn-action.danger:hover{background:#dc2626}.btn-action.info{background:#3b82f6;color:#fff;border:none}.btn-action.info:hover{background:#2563eb}.btn-action.return{background:#f97316;color:#fff;border:none}.btn-action.return:hover{background:#ea580c}.btn-action.outline{background:0 0;border:2px solid var(--ds-primary);color:var(--ds-primary)}.btn-action.outline:hover{background:var(--ds-primary);color:#fff}.table-responsive{overflow-x:auto;background:var(--ds-bg-surface);border-radius:var(--ds-radius-lg);padding:var(--ds-spacing-lg);border:1px solid var(--ds-border-light);box-shadow:var(--ds-shadow-md);margin-bottom:var(--ds-spacing-lg)}.invoices-table{width:100%;border-collapse:collapse;min-width:1400px}.invoices-table th{background:var(--ds-bg-secondary);padding:15px 12px;font-weight:700;color:var(--ds-text-primary);border-bottom:2px solid var(--ds-warning,#f97316);white-space:nowrap;font-size:.9rem;text-align:center}.invoices-table td{padding:15px 12px;border-bottom:1px solid var(--ds-border-light);color:var(--ds-text-primary);vertical-align:middle;text-align:center}.invoices-table tbody tr:hover{background:rgba(var(--ds-primary-rgb),.05)}.status-badge{padding:4px 10px;border-radius:20px;font-size:.8rem;font-weight:600;display:inline-block;text-align:center;min-width:80px;background:rgba(249,115,22,.1);color:#f97316}.status-badge.partial{background:rgba(245,158,11,.1);color:#f59e0b}.status-badge.full{background:rgba(239,68,68,.1);color:#ef4444}.table-actions{display:flex;gap:8px;justify-content:center}.table-icon-btn{background:0 0;border:none;color:var(--ds-text-secondary);font-size:1.1rem;cursor:pointer;padding:6px;border-radius:var(--ds-radius-sm);transition:all .2s;width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center}.table-icon-btn:hover{background:rgba(var(--ds-primary-rgb),.1);color:var(--ds-primary);transform:translateY(-2px)}.table-icon-btn.view:hover{color:#3b82f6}.table-icon-btn.delete:hover{color:#ef4444}.loading-spinner{text-align:center;padding:3rem;color:var(--ds-primary)}.empty-state{text-align:center;padding:4rem;background:var(--ds-bg-surface);border-radius:var(--ds-radius-lg);border:1px solid var(--ds-border)}.empty-state i{font-size:3rem;color:var(--ds-text-secondary);margin-bottom:1rem}.empty-state h3{font-size:1.5rem;margin-bottom:.5rem}.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:2000;opacity:0;visibility:hidden;transition:opacity .3s ease,visibility .3s}.modal-overlay.show{opacity:1;visibility:visible}.modal-content{background:var(--ds-bg-surface);border-radius:var(--ds-radius-lg);width:90%;max-width:700px;max-height:90vh;overflow-y:auto;padding:var(--ds-spacing-xl);box-shadow:var(--ds-shadow-xl);transform:scale(.9) translateY(20px);transition:transform .4s cubic-bezier(.34, 1.56, .64, 1)}.modal-overlay.show .modal-content{transform:scale(1) translateY(0)}.modal-content h3{margin-bottom:var(--ds-spacing-lg);font-family:var(--ds-font-heading);display:flex;align-items:center;gap:10px;font-size:1.5rem;color:#f97316}.summary-section{background:var(--ds-bg-secondary);border-radius:var(--ds-radius-md);padding:var(--ds-spacing-lg);margin-bottom:var(--ds-spacing-lg)}.summary-section h4{margin-bottom:var(--ds-spacing-md);color:#f97316}.summary-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--ds-spacing-md)}.summary-item{margin-bottom:8px}.summary-item .label{font-size:.9rem;color:var(--ds-text-secondary)}.summary-item .value{font-weight:700;font-size:1.1rem}.summary-products{max-height:200px;overflow-y:auto}.summary-product-row{display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid var(--ds-border-light)}.modal-actions{display:flex;justify-content:flex-end;gap:var(--ds-spacing-sm);margin-top:var(--ds-spacing-xl);padding-top:var(--ds-spacing-lg);border-top:1px solid var(--ds-border)}.flex{display:flex}.gap-3{gap:12px}.flex-center{align-items:center}.hidden{display:none!important}</style></head><body><div id="notificationContainer"></div><header class="live-header top-header" id="liveHeader"><div class="header-content"><div class="header-logo" id="headerLogoContainer"><span id="headerLogoText" class="logo-text">MR.Flow</span></div><nav class="header-nav" id="headerNavigation"></nav><div class="flex gap-3 flex-center"><div class="theme-switch-container" id="themeSwitchContainer"><label class="theme-switch"><input type="checkbox" id="themeSwitch" class="theme-switch__checkbox"><div class="theme-switch__container"><div class="theme-switch__circle-container"><div class="theme-switch__sun-moon-container"><div class="theme-switch__moon"><div class="theme-switch__spot"></div><div class="theme-switch__spot"></div><div class="theme-switch__spot"></div></div></div></div></div></label></div><div class="notifications-module"><button class="notifications-btn" id="notificationsBtn"><i class="fas fa-bell"></i><div class="notifications-badge" id="notificationsBadge">3</div></button><div class="notifications-panel" id="notificationsPanel"><div class="notifications-header"><div class="notifications-title">الإشعارات</div><button class="mark-all-read"><i class="fas fa-check-double"></i> تعيين الكل كمقروء</button></div><div class="notifications-list" id="notificationsList"></div></div></div><div class="subscription-module"><button class="subscription-btn" id="subscriptionBtn"><i class="fas fa-crown"></i><span>الاشتراك</span></button><div class="subscription-panel" id="subscriptionPanel"><div class="mb-4"><h4 class="mb-3"><i class="fas fa-crown"></i> حالة الاشتراك</h4><div id="subscriptionDetails"></div></div><div class="flex gap-2"><button class="btn-action primary flex-1" onclick="upgradeSubscription()"><i class="fas fa-arrow-up"></i>ترقية</button><button class="btn-action outline flex-1" onclick="contactSupport()"><i class="fas fa-headset"></i>دعم</button></div></div></div><div class="user-menu-module"><div class="user-btn" id="userBtn"><i class="fas fa-user"></i></div><div class="user-dropdown" id="userDropdown"></div></div></div></div></header><main><div class="page-header"><h1><i class="fas fa-undo-alt" style="color:#f97316"></i> إدارة فواتير المرتجع</h1><div class="actions"><button class="btn-action primary" id="backToSalesBtn" onclick="window.location.href='INVOICE.html'"><i class="fas fa-file-invoice"></i> العودة لفواتير البيع</button><div class="search-box"><i class="fas fa-search"></i> <input type="text" id="searchInput" placeholder="بحث برقم الفاتورة أو العميل ..."></div><button class="btn-action success" id="exportExcelBtn" data-permission="export_returns"><i class="fas fa-file-excel"></i> تصدير Excel</button></div></div><div id="loadingIndicator" class="loading-spinner" style="display:none"><i class="fas fa-spinner fa-spin fa-3x"></i><p>جاري تحميل فواتير المرتجع...</p></div><div id="tableContainer" style="display:none"><div class="table-responsive"><table class="invoices-table" id="returnsTable"><thead><tr><th>#</th><th><i class="fas fa-hashtag"></i> رقم الفاتورة</th><th><i class="fas fa-undo-alt"></i> نوع المرتجع</th><th><i class="fas fa-user"></i> العميل</th><th><i class="fas fa-calendar"></i> تاريخ المرتجع</th><th><i class="fas fa-weight"></i> الوزن (كجم)</th><th><i class="fas fa-money-bill"></i> إجمالي المرتجع</th><th><i class="fas fa-info-circle"></i> الحالة</th><th><i class="fas fa-cog"></i> الإجراءات</th></tr></thead><tbody id="returnsTableBody"></tbody></table></div></div><div id="emptyState" class="empty-state" style="display:none"><i class="fas fa-undo-alt"></i><h3>لا توجد فواتير مرتجع</h3><p>لم يتم العثور على أي مرتجعات. يمكنك إنشاء مرتجع من صفحة فواتير البيع.</p></div></main><div id="returnDetailsModal" class="modal-overlay"><div class="modal-content"><h3><i class="fas fa-receipt"></i> تفاصيل فاتورة المرتجع</h3><div id="returnDetailsContent"></div><div class="modal-actions"><button class="btn-action" id="closeDetailsModal">إغلاق</button></div></div></div><script src="notifications.js"></script><script src="header-script.js"></script><script src="returns_0.js"></script></body><script src="./alljs.js"></script></html>
