<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" type="image/png" sizes="32x32" href="logo.png"><title>MR.Flow - إدارة المهام</title><link rel="stylesheet" href="allcss.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=El+Messiri:wght@400;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script><link rel="stylesheet" href="header-styles.css"><style>:root{--ds-primary:#10b981;--ds-primary-rgb:16,185,129;--ds-secondary:#059669;--ds-secondary-rgb:5,150,105;--ds-warning:#f59e0b;--ds-warning-rgb:245,158,11;--ds-danger:#ef4444;--ds-danger-rgb:239,68,68;--ds-info:#3b82f6;--ds-info-rgb:59,130,246;--ds-purple:#8b5cf6;--ds-purple-rgb:139,92,246}main{padding:2rem;max-width:1400px;margin:0 auto}.page-header{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:var(--ds-spacing-md);margin-bottom:var(--ds-spacing-lg);background:var(--ds-bg-surface);padding:var(--ds-spacing-lg);border-radius:var(--ds-radius-lg);box-shadow:var(--ds-shadow-sm)}.page-header h1{font-family:var(--ds-font-heading);font-size:2rem;background:linear-gradient(135deg,#8b5cf6,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:flex;align-items:center;gap:10px;margin:0}.actions{display:flex;gap:var(--ds-spacing-sm);flex-wrap:wrap}.btn-action{padding:.6rem 1.4rem;border:none;border-radius:var(--ds-radius-md);font-family:var(--ds-font-primary);font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .2s ease;background:var(--ds-bg-surface);color:var(--ds-text-primary);border:1px solid var(--ds-border);white-space:nowrap}.btn-action:hover{transform:translateY(-2px);box-shadow:var(--ds-shadow-md);border-color:var(--ds-primary);color:var(--ds-primary)}.btn-action.primary{background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:#fff;border:none}.btn-action.success{background:#10b981;color:#fff;border:none}.btn-action.success:hover{background:#059669}.btn-action.warning{background:#f59e0b;color:#fff;border:none}.btn-action.warning:hover{background:#d97706}.btn-action.danger{background:#ef4444;color:#fff;border:none}.btn-action.danger:hover{background:#dc2626}.btn-action.info{background:#3b82f6;color:#fff;border:none}.btn-action.info:hover{background:#2563eb}.btn-action.outline{background:0 0;border:2px solid var(--ds-primary);color:var(--ds-primary)}.btn-action.outline:hover{background:var(--ds-primary);color:#fff}.search-box{display:flex;align-items:center;background:var(--ds-bg-surface);border:1px solid var(--ds-border);border-radius:var(--ds-radius-lg);padding:.4rem 1rem;box-shadow:var(--ds-shadow-sm);min-width:300px}.search-box i{color:var(--ds-text-secondary);margin-left:8px}.search-box input{border:none;background:0 0;color:var(--ds-text-primary);font-family:var(--ds-font-primary);outline:0;width:100%}.filter-section{background:var(--ds-bg-surface);border-radius:var(--ds-radius-lg);padding:var(--ds-spacing-lg);margin-bottom:var(--ds-spacing-lg);border:1px solid var(--ds-border);display:flex;flex-wrap:wrap;gap:15px;align-items:flex-end}.filter-group{display:flex;flex-direction:column;min-width:150px;flex:1}.filter-group label{font-size:.8rem;color:var(--ds-text-secondary);margin-bottom:4px}.filter-group input,.filter-group select{padding:.6rem;border:1px solid var(--ds-border);border-radius:var(--ds-radius-md);background:var(--ds-bg-primary);color:var(--ds-text-primary);font-family:var(--ds-font-primary)}.tasks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:20px;margin-top:20px}.task-card{background:var(--ds-bg-surface);border-radius:var(--ds-radius-lg);padding:var(--ds-spacing-lg);border:1px solid var(--ds-border-light);box-shadow:var(--ds-shadow-sm);transition:all .3s ease;display:flex;flex-direction:column;gap:15px}.task-card:hover{transform:translateY(-4px);box-shadow:var(--ds-shadow-lg);border-color:var(--ds-purple)}.task-header{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--ds-border-light);padding-bottom:10px}.task-title{font-size:1.1rem;font-weight:700;color:var(--ds-text-primary)}.task-status{padding:4px 10px;border-radius:20px;font-size:.75rem;font-weight:600}.task-status.pending{background:rgba(245,158,11,.1);color:#f59e0b}.task-status.in-progress{background:rgba(59,130,246,.1);color:#3b82f6}.task-status.completed{background:rgba(16,185,129,.1);color:#10b981}.task-status.cancelled{background:rgba(239,68,68,.1);color:#ef4444}.task-details{display:flex;flex-direction:column;gap:8px;font-size:.9rem}.task-detail-item{display:flex;align-items:center;gap:10px}.task-detail-item i{width:20px;color:var(--ds-purple)}.task-detail-item .label{color:var(--ds-text-secondary);min-width:80px}.task-detail-item .value{color:var(--ds-text-primary);font-weight:500}.priority-badge{padding:2px 8px;border-radius:12px;font-size:.7rem;font-weight:600}.priority-badge.urgent{background:rgba(239,68,68,.1);color:#ef4444}.priority-badge.high{background:rgba(245,158,11,.1);color:#f59e0b}.priority-badge.medium{background:rgba(59,130,246,.1);color:#3b82f6}.priority-badge.low{background:rgba(16,185,129,.1);color:#10b981}.task-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:10px;border-top:1px solid var(--ds-border-light);padding-top:15px}.task-action-btn{background:0 0;border:none;color:var(--ds-text-secondary);font-size:.9rem;cursor:pointer;padding:6px;border-radius:var(--ds-radius-sm);transition:all .2s;width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center}.task-action-btn:hover{background:rgba(var(--ds-purple-rgb),.1);color:var(--ds-purple);transform:translateY(-2px)}.loading-spinner{text-align:center;padding:3rem;color:var(--ds-purple)}.empty-state{text-align:center;padding:4rem;background:var(--ds-bg-surface);border-radius:var(--ds-radius-lg);border:1px solid var(--ds-border)}.empty-state i{font-size:3rem;color:var(--ds-text-secondary);margin-bottom:1rem}.empty-state h3{font-size:1.5rem;margin-bottom:.5rem}.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:2000;opacity:0;visibility:hidden;transition:opacity .3s ease,visibility .3s}.modal-overlay.show{opacity:1;visibility:visible}.modal-content{background:var(--ds-bg-surface);border-radius:var(--ds-radius-lg);width:90%;max-width:600px;max-height:90vh;overflow-y:auto;padding:var(--ds-spacing-xl);box-shadow:var(--ds-shadow-xl);transform:scale(.9) translateY(20px);transition:transform .4s cubic-bezier(.34, 1.56, .64, 1)}.modal-overlay.show .modal-content{transform:scale(1) translateY(0)}.modal-content.large{max-width:800px}.modal-content h2{margin-bottom:var(--ds-spacing-lg);font-family:var(--ds-font-heading);display:flex;align-items:center;gap:10px;font-size:1.5rem;color:#8b5cf6}.form-group{margin-bottom:var(--ds-spacing-md)}.form-group label{display:block;margin-bottom:6px;font-weight:600;color:var(--ds-text-secondary);font-size:.9rem}.form-group label i{margin-left:6px;color:var(--ds-purple)}.form-group input,.form-group select,.form-group textarea{width:95%;padding:.8rem 1rem;border:1px solid var(--ds-border);border-radius:var(--ds-radius-md);background:var(--ds-bg-primary);color:var(--ds-text-primary);font-family:var(--ds-font-primary);transition:border .2s,box-shadow .2s}.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:0;border-color:var(--ds-purple);box-shadow:0 0 0 3px rgba(var(--ds-purple-rgb),.2)}.modal-actions{display:flex;justify-content:flex-end;gap:var(--ds-spacing-sm);margin-top:var(--ds-spacing-xl);padding-top:var(--ds-spacing-lg);border-top:1px solid var(--ds-border)}.flex{display:flex}.gap-2{gap:8px}.gap-3{gap:12px}.flex-center{align-items:center}.mt-3{margin-top:12px}.mb-3{margin-bottom:12px}.text-center{text-align:center}.hidden{display:none!important}</style></head><body><div id="notificationContainer"></div><header class="live-header top-header" id="liveHeader"><div class="header-content"><div class="header-logo" id="headerLogoContainer"><span id="headerLogoText" class="logo-text">MR.Flow</span></div><nav class="header-nav" id="headerNavigation"></nav><div class="flex gap-3 flex-center"><div class="theme-switch-container" id="themeSwitchContainer"><label class="theme-switch"><input type="checkbox" id="themeSwitch" class="theme-switch__checkbox"><div class="theme-switch__container"><div class="theme-switch__circle-container"><div class="theme-switch__sun-moon-container"><div class="theme-switch__moon"><div class="theme-switch__spot"></div><div class="theme-switch__spot"></div><div class="theme-switch__spot"></div></div></div></div></div></label></div><div class="notifications-module"><button class="notifications-btn" id="notificationsBtn"><i class="fas fa-bell"></i><div class="notifications-badge" id="notificationsBadge">3</div></button><div class="notifications-panel" id="notificationsPanel"><div class="notifications-header"><div class="notifications-title">الإشعارات</div><button class="mark-all-read"><i class="fas fa-check-double"></i> تعيين الكل كمقروء</button></div><div class="notifications-list" id="notificationsList"></div></div></div><div class="subscription-module"><button class="subscription-btn" id="subscriptionBtn"><i class="fas fa-crown"></i><span>الاشتراك</span></button><div class="subscription-panel" id="subscriptionPanel"><div class="mb-4"><h4 class="mb-3"><i class="fas fa-crown"></i> حالة الاشتراك</h4><div id="subscriptionDetails"></div></div><div class="flex gap-2"><button class="btn-action primary flex-1" onclick="upgradeSubscription()"><i class="fas fa-arrow-up"></i>ترقية</button> <button class="btn-action outline flex-1" onclick="contactSupport()"><i class="fas fa-headset"></i>دعم</button></div></div></div><div class="user-menu-module"><div class="user-btn" id="userBtn"><i class="fas fa-user"></i></div><div class="user-dropdown" id="userDropdown"></div></div></div></div></header><main><div class="page-header"><h1><i class="fas fa-tasks"></i> إدارة المهام (Tasks)</h1><div class="actions"><button class="btn-action info" id="refreshBtn" onclick="loadAllData()"><i class="fas fa-sync-alt"></i> تحديث</button><div class="search-box"><i class="fas fa-search"></i> <input type="text" id="searchInput" placeholder="بحث في المهام..."></div><button class="btn-action primary" data-permission="create_task" id="newTaskBtn" onclick="openTaskModal()"><i class="fas fa-plus-circle"></i> مهمة جديدة</button></div></div><div class="filter-section"><div class="filter-group"><label><i class="fas fa-user-tie"></i> المسؤول</label> <select id="filterEmployee"><option value="">كل الموظفين</option></select></div><div class="filter-group"><label><i class="fas fa-flag"></i> الحالة</label> <select id="filterStatus"><option value="">كل الحالات</option><option value="pending">جديدة</option><option value="in-progress">قيد التنفيذ</option><option value="completed">منتهية</option><option value="cancelled">ملغية</option></select></div><div class="filter-group"><label><i class="fas fa-exclamation-triangle"></i> الأولوية</label> <select id="filterPriority"><option value="">كل الأولويات</option><option value="urgent">عاجل</option><option value="high">مرتفعة</option><option value="medium">متوسطة</option><option value="low">منخفضة</option></select></div><button class="btn-action outline" id="applyFiltersBtn" onclick="applyFilters()"><i class="fas fa-check"></i> تطبيق الفلاتر</button> <button class="btn-action" id="resetFiltersBtn" onclick="resetFilters()"><i class="fas fa-redo"></i> إعادة تعيين</button></div><div id="loadingIndicator" class="loading-spinner" style="display:none"><i class="fas fa-spinner fa-spin fa-3x"></i><p>جاري تحميل المهام...</p></div><div id="tasksContainer" style="display:none"><div class="tasks-grid" id="tasksGrid"></div></div><div id="emptyState" class="empty-state" style="display:none"><i class="fas fa-clipboard-list"></i><h3>لا توجد مهام</h3><p>لم يتم العثور على أي مهام. قم بإنشاء مهمة جديدة.</p></div></main><div id="taskModal" class="modal-overlay"><div class="modal-content"><h2 id="modalTitle"><i class="fas fa-plus-circle"></i> إنشاء مهمة جديدة</h2><input type="hidden" id="taskId"><div class="form-group"><label><i class="fas fa-heading"></i> عنوان المهمة</label> <input type="text" id="taskTitle" placeholder="أدخل عنوان المهمة..." required></div><div class="form-group"><label><i class="fas fa-align-left"></i> وصف المهمة</label> <textarea id="taskDescription" rows="3" placeholder="أدخل وصفًا تفصيليًا للمهمة..."></textarea></div><div class="form-group"><label><i class="fas fa-user-tie"></i> المسؤول (السيلز)</label> <select id="taskEmployee" required><option value="">اختر الموظف المسؤول</option></select></div><div class="form-group"><label><i class="fas fa-exclamation-triangle"></i> مدى الأهمية</label> <select id="taskPriority" required><option value="urgent">عاجل</option><option value="high" selected="selected">مرتفع</option><option value="medium">متوسط</option><option value="low">منخفض</option></select></div><div class="form-group"><label><i class="fas fa-calendar-alt"></i> آخر موعد للإنجاز</label> <input type="datetime-local" id="taskDueDate" required></div><div class="modal-actions"><button class="btn-action" id="cancelTaskModal">إلغاء</button> <button class="btn-action primary" id="saveTaskBtn"><i class="fas fa-check"></i> حفظ المهمة</button></div></div></div><div id="taskActionModal" class="modal-overlay"><div class="modal-content"><h3 id="taskActionModalTitle"><i class="fas fa-tasks"></i> تحديث حالة المهمة</h3><input type="hidden" id="actionTaskId"><div id="actionTaskSummary" class="invoice-details" style="background:var(--ds-bg-secondary);padding:15px;border-radius:8px;margin-bottom:20px"></div><div class="form-group"><label><i class="fas fa-flag"></i> الحالة الجديدة</label> <select id="taskNewStatus"><option value="pending">جديدة</option><option value="in-progress">قيد التنفيذ</option><option value="completed">منتهية</option><option value="cancelled">ملغية</option></select></div><div class="form-group"><label><i class="fas fa-sticky-note"></i> ملاحظات (اختياري)</label> <textarea id="taskActionNotes" rows="3" placeholder="أضف ملاحظات حول هذا التحديث..."></textarea></div><div class="modal-actions"><button class="btn-action" id="cancelActionModal">إلغاء</button> <button class="btn-action primary" id="confirmTaskActionBtn"><i class="fas fa-check"></i> تأكيد التحديث</button></div></div></div><script src="notifications.js"></script><script src="header-script.js"></script><script src="tasks_0.js"></script></body><script src="./alljs.js"></script></html>
