:rgba(255,255,255,0.1);--ds-border-light:rgba(255,255,255,0.05)}*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--ds-font-primary);background:var(--ds-bg-primary);color:var(--ds-text-primary);line-height:1.6;transition:background-color .3s,color .3s;min-height:100vh;padding:2rem 1rem}.toggle-switch{position:relative;display:inline-block;width:50px;height:26px;margin:0 8px}.toggle-switch input{opacity:0;width:0;height:0}.toggle-switch__slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#ccc;transition:.3s;border-radius:34px}.toggle-switch__slider:before{position:absolute;content:"";height:20px;width:20px;left:3px;bottom:3px;background-color:#fff;transition:.3s;border-radius:50%}input:checked+.toggle-switch__slider{background:var(--ds-gradient)}input:checked+.toggle-switch__slider:before{transform:translateX(24px)}.tabs-container{display:flex;gap:10px;margin-bottom:20px;border-bottom:2px solid var(--ds-border-light);padding-bottom:10px;flex-wrap:wrap}.tab-btn{padding:10px 24px;border:none;background:0 0;color:var(--ds-text-secondary);font-family:var(--ds-font-primary);font-weight:600;font-size:1.1rem;cursor:pointer;border-radius:var(--ds-radius-md) var(--ds-radius-md) 0 0;transition:all .2s;display:flex;align-items:center;gap:8px}.tab-btn i{font-size:1.2rem}.tab-btn.active{color:var(--ds-primary);border-bottom:3px solid var(--ds-primary)}.tab-btn:hover{color:var(--ds-primary);background:rgba(var(--ds-primary-rgb),.05)}.container{max-width:1200px;margin:0 auto}.page-header{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:var(--ds-spacing-md);margin-bottom:var(--ds-spacing-lg)}.page-header h1{font-family:var(--ds-font-heading);font-size:2rem;background:var(--ds-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.actions{display:flex;gap:var(--ds-spacing-sm);flex-wrap:wrap}.search-box{display:flex;align-items:center;background:var(--ds-bg-surfa modal-content label{display:block;margin-bottom:6px;font-weight:600;color:var(--ds-text-secondary)}.modal-content input,.modal-content select,.modal-content textarea{width:100%;padding:.8rem 1rem;border:1px solid var(--ds-border);border-radius:var(--ds-radius-md);background:var(--ds-bg-primary);color:var(--ds-text-primary);font-family:var(--ds-font-primary);transition:border .2s}.modal-content input:focus,.modal-content select:focus,.modal-content textarea:focus{outline:0;border-color:var(--ds-primary);box-shadow:0 0 0 3px rgba(var(--ds-primary-rgb),.2)}.row-2cols{display:grid;grid-template-columns:1fr 1fr;gap:var(--ds-spacing-md)}.modal-actions{display:flex;justify-content:flex-end;gap:var(--ds-spacing-sm);margin-top:var(--ds-spacing-lg)}.products-checkbox-list{max-height:250px;overflow-y:auto;border:1px solid var(--ds-border);border-radius:var(--ds-radius-md);padding:10px;background:var(--ds-bg-secondary)}.products-checkbox-list label{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--ds-radius-sm);cursor:pointer;transition:background .2s}.products-checkbox-list label:hover{background:rgba(var(--ds-primary-rgb),.1)}.products-checkbox-list input[type=checkbox]{width:18px;height:18px;accent-color:var(--ds-primary)}.spinner{display:inline-block;width:20px;height:20px;border:3px solid rgba(255,255,255,.3);border-radius:50%;border-top-color:#fff;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.btn .spinner{margin-right:8px}.notification-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none}.notification{background:var(--ds-bg-surface);padding:.8rem 1.5rem;border-radius:var(--ds-radius-lg);box-shadow:var(--ds-shadow-xl);display:flex;align-items:center;gap:12px;border-right:4px solid var(--ds-primary);transform:translateY(-20px);opacity:0;transition:all .3s;pointer-events:all;color:var(--ds-text-primary)}.notification.show{transform:translateY(0);opacity:1}.notification.success{border-right-color:#10b981}.notification.error{border-right-color:#ef4444}.notification i{font-size:1.2rem}.notification.success i{color:#10b981}.notification.error i{color:#ef4444}.price-summary{background:var(--ds-bg-secondary);padding:10px 12px;border-radius:var(--ds-radius-md);font-size:1rem;display:flex;align-items:center;justify-content:space-between;border:1px solid var(--ds-border-light);margin-bottom:12px}.price-summary .total-label{font-weight:600}.price-summary .total-value{font-weight:700;color:var(--ds-primary);font-size:1.1rem}@media (max-width:600px){.page-header{flex-direction:column;align-items:stretch}.search-box input{width:100%}.status-grid{grid-template-columns:1fr}.tabs-container{justify-content:center}.row-2cols{grid-template-columns:1fr}}</style></head><body><div id="notificationContainer" class="notification-container"></div><div class="container"><div class="tabs-container"><button class="tab-btn" id="tabWarehouses"><i class="fas fa-warehouse"></i> المخازن</button> <button class="tab-btn active" id="tabProducts"><i class="fas fa-box"></i> المنتجات</button> <button class="tab-btn" id="tabUnits"><i class="fas fa-balance-scale"></i> الوحدات</button> <button class="tab-btn" id="tabCategories"><i class="fas fa-tags"></i> التصنيفات</button> <button class="tab-btn" id="tabBundles"><i class="fas fa-gift"></i> الباندلات</button></div><div class="page-header"><h1 id="pageTitle"><i class="fas fa-boxes" style="margin-left:10px"></i> إدارة المنتجات</h1><div class="actions"><div class="search-box"><i class="fas fa-search"></i> <input type="text" id="searchInput" placeholder="بحث..."></div><button class="btn btn-success" id="exportExcelBtn" title="تصدير Excel"><i class="fas fa-file-excel"></i> Excel</button> <button class="btn btn-primary" id="addBtn"><i class="fas fa-plus"></i> <span id="addBtnText">منتج جديد</span></button></div></div><div id="loadingIndicator" style="text-align:center;padding:2rem class="modal-overlay"><div class="modal-content"><h3 id="warehouseModalTitle">إضافة مخزن</h3><div class="form-group"><label for="warehouseName">اسم المخزن *</label> <input type="text" id="warehouseName" placeholder="مثال: مخزن رئيسي" autocomplete="off"></div><div class="row-2cols"><div class="form-group" style="display:flex;align-items:center;gap:10px"><label style="margin:0">مفعل</label> <input type="checkbox" id="warehouseActive" checked="checked" style="width:20px;height:20px"></div><div class="form-group" style="display:flex;align-items:center;gap:10px"><label style="margin:0">رئيسي</label> <input type="checkbox" id="warehouseIsMain" style="width:20px;height:20px"></div></div><div class="modal-actions"><button class="btn" id="cancelWarehouseModal">إلغاء</button> <button class="btn btn-primary" id="saveWarehouseBtn">حفظ</button></div></div></div><div id="unitModal" class="modal-overlay"><div class="modal-content"><h3 id="unitModalTitle">إضافة وحدة</h3><div class="form-group"><label for="unitName">اسم الوحدة *</label> <input type="text" id="unitName" placeholder="مثال: كيلوغرام" autocomplete="off"></div><div class="form-group" style="display:flex;align-items:center;gap:10px"><label style="margin:0">مفعل</label> <input type="checkbox" id="unitActive" checked="checked" style="width:20px;height:20px"></div><div class="modal-actions"><button class="btn" id="cancelUnitModal">إلغاء</button> <button class="btn btn-primary" id="saveUnitBtn">حفظ</button></div></div></div><div id="categoryModal" class="modal-overlay"><div class="modal-content"><h3 id="categoryModalTitle">إضافة تصنيف</h3><div class="form-group"><label for="categoryName">اسم التصنيف *</label> <input type="text" id="categoryName" placeholder="مثال: الكترونيات" autocomplete="off"></div><div class="form-group" style="display:flex;align-items:center;gap:10px"><label style="margin:0">مفعل</label> <input type="checkbox" id="categoryActive" checked="checked" style="width:20px;height:20px"></div><div class="modal-actions"><button class="btn" id="cancelCategoryModal">إلغاء</button> <button class="btn btn-primary" id="saveCategoryBtn">حفظ</button></div></div></div><div id="bundleModal" class="modal-overlay"><div class="modal-content"><h3 id="bundleModalTitle">إضافة باندل</h3><div class="form-group"><label for="bundleName">اسم الباندل *</label> <input type="text" id="bundleName" placeholder="مثال: باقة العروض" autocomplete="off"></div><div class="form-group"><label>المنتجات المضمنة</label><div id="bundleProductsContainer" class="products-checkbox-list"></div><small style="color:var(--ds-text-secondary)">اختر منتجاً واحداً أو أكثر</small></div><div class="price-summary"><span class="total-label"><i class="fas fa-calculator"></i> السعر التجميعي (قطاعي):</span> <span class="total-value" id="bundleTotalPriceDisplay">0.00</span></div><div class="row-2cols"><div class="form-group"><label for="bundleCustomPrice">السعر المخصص (اختياري)</label> <input type="number" id="bundleCustomPrice" placeholder="مثال: 1900" step="0.01"></div><div class="form-group" style="display:flex;align-items:center;gap:10px"><label style="margin:0">مفعل</label> <input type="checkbox" id="bundleActive" checked="checked" style="width:20px;height:20px"></div></div><div class="modal-actions"><button class="btn" id="cancelBundleModal">إلغاء</button> <button class="btn btn-primary" id="saveBundleBtn">حفظ</button></div></div></div><div id="deleteModal" class="modal-overlay"><div class="modal-content"><h3><i class="fas fa-exclamation-triangle" style="color:#ef4444;margin-left:8px"></i>تأكيد الحذف</h3><p id="deleteMessage">هل أنت متأكد من حذف هذا العنصر؟</p><div class="modal-actions"><button class="btn" id="cancelDeleteBtn">إلغاء</button> <button class="btn btn-danger" id="confirmDeleteBtn">حذف</button></div></div></div><script src="store_0.js"></script></body><script src="gosignin.js"></script><script src="permissionGuard.js"></script><script src="limitpaln.js"></script></html>
